<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">

  <!-- Tail -->
  <path d="M 14 46 Q 4 42 3 52 Q 8 58 20 52 Z"
        fill="#34d399" stroke="#065f46" stroke-width="1.5" stroke-linejoin="round"/>

  <!-- Body -->
  <ellipse cx="34" cy="46" rx="20" ry="15"
           fill="#34d399" stroke="#065f46" stroke-width="2"/>

  <!-- Belly (lighter patch) -->
  <ellipse cx="34" cy="48" rx="13" ry="9" fill="#6ee7b7"/>

  <!-- Neck -->
  <path d="M 44 36 Q 50 30 52 38 Q 48 44 42 42 Z"
        fill="#34d399" stroke="#065f46" stroke-width="1.5" stroke-linejoin="round"/>

  <!-- Head -->
  <ellipse cx="52" cy="30" rx="11" ry="10"
           fill="#34d399" stroke="#065f46" stroke-width="2"/>

  <!-- Snout upper -->
  <path d="M 46 30 Q 56 26 63 30 Q 62 34 55 34 Q 48 34 46 30 Z"
        fill="#34d399" stroke="#065f46" stroke-width="1.5" stroke-linejoin="round"/>

  <!-- Snout lower jaw -->
  <path d="M 47 33 Q 56 32 63 30 Q 62 37 55 37 Q 48 37 47 33 Z"
        fill="#2dd4bf" stroke="#065f46" stroke-width="1.5" stroke-linejoin="round"/>

  <!-- Teeth -->
  <path d="M 50 34 L 48.5 37 L 51 36 L 52.5 38.5 L 55 36.5 L 57 38 L 59 35 L 61.5 33.5"
        fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Tooth tips (white triangles) -->
  <polygon points="48.5,34 47.5,37.5 50,36.5" fill="white"/>
  <polygon points="52,34.5 51,38.5 53.5,37" fill="white"/>
  <polygon points="56,34 55,37.5 57.5,36" fill="white"/>

  <!-- Nostril -->
  <ellipse cx="61.5" cy="29.5" rx="1.2" ry="0.9" fill="#065f46"/>

  <!-- Eye white -->
  <circle cx="54" cy="26" r="4.5" fill="white" stroke="#065f46" stroke-width="1.2"/>
  <!-- Pupil -->
  <circle cx="54.8" cy="26" r="2.5" fill="#1e1b4b"/>
  <!-- Shine -->
  <circle cx="55.8" cy="24.8" r="1" fill="white"/>

  <!-- Eyebrow (for expression) -->
  <path d="M 50.5 22.5 Q 54 21 57 22.5" stroke="#065f46" stroke-width="1.5"
        fill="none" stroke-linecap="round"/>

  <!-- Tiny arm -->
  <path d="M 44 42 Q 39 37 37 41" stroke="#065f46" stroke-width="2"
        fill="none" stroke-linecap="round"/>
  <!-- Tiny claws -->
  <path d="M 37 41 L 34 39 M 37 41 L 35 43 M 37 41 L 34 42"
        stroke="#065f46" stroke-width="1.2" stroke-linecap="round"/>

  <!-- Left leg -->
  <rect x="22" y="57" width="10" height="9" rx="4"
        fill="#34d399" stroke="#065f46" stroke-width="1.8"/>
  <!-- Left foot -->
  <ellipse cx="25" cy="66" rx="8" ry="3" fill="#2dd4bf" stroke="#065f46" stroke-width="1.5"/>

  <!-- Right leg -->
  <rect x="34" y="57" width="10" height="9" rx="4"
        fill="#34d399" stroke="#065f46" stroke-width="1.8"/>
  <!-- Right foot -->
  <ellipse cx="40" cy="66" rx="8" ry="3" fill="#2dd4bf" stroke="#065f46" stroke-width="1.5"/>

  <!-- Big D on belly (purple - brand color) -->
  <text x="27" y="52"
        font-family="Arial Black, Impact, sans-serif"
        font-weight="900"
        font-size="16"
        fill="#7c3aed"
        stroke="#4c1d95"
        stroke-width="0.8"
        paint-order="stroke">D</text>

</svg>
